services:
  nox:
    build: .
    ports:
      - "127.0.0.1:6767:6767"
    volumes:
      - nox-data:/home/nox/.nox
    environment:
      - NOX_LLM_BASE_URL=http://ollama:11434/v1
      - NOX_LLM_MODEL=llama3:8b
      - NOX_API_KEY=${NOX_API_KEY:?set NOX_API_KEY before running docker compose}
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"X-Nox-API-Key: $$NOX_API_KEY\" http://127.0.0.1:6767/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  nox-data:
  ollama-data:
